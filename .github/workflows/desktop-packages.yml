name: Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    env:
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT }}
      WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
      WINDOWS_DIGEST_ALGORITHM: ${{ vars.WINDOWS_DIGEST_ALGORITHM }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            build-command: pnpm run desktop:build:windows
            artifact-name: windows-packages
            artifact-path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - platform: macos
            os: macos-latest
            build-command: pnpm run desktop:build:macos
            artifact-name: macos-packages
            artifact-path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
          - platform: linux
            os: ubuntu-22.04
            build-command: pnpm run desktop:build:linux
            artifact-name: linux-packages
            artifact-path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libxdo-dev rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows' && env.WINDOWS_CERTIFICATE_BASE64 != '' && env.WINDOWS_CERTIFICATE_PASSWORD != ''
        run: pnpm run signing:windows:import

      - name: Configure Windows signing
        if: matrix.platform == 'windows' && env.WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT != ''
        run: pnpm run signing:windows:configure

      - name: Build packages
        run: ${{ matrix.build-command }}

      - name: Verify Windows signatures
        if: matrix.platform == 'windows' && env.WINDOWS_SIGNING_CERTIFICATE_THUMBPRINT != ''
        run: pnpm run signing:windows:verify

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          release_dir="release-files/${{ matrix.platform }}"
          rm -rf "$release_dir"
          mkdir -p "$release_dir"
          shopt -s nullglob
          version="$(node -p "require('./package.json').version")"
          arch="$(printf '%s' "${RUNNER_ARCH:-X64}" | tr '[:upper:]' '[:lower:]')"

          case "${{ matrix.platform }}" in
            windows)
              files=(src-tauri/target/release/bundle/nsis/*.exe)
              ;;
            macos)
              files=(src-tauri/target/release/bundle/dmg/*.dmg)
              ;;
            linux)
              files=(src-tauri/target/release/bundle/appimage/*.AppImage src-tauri/target/release/bundle/deb/*.deb src-tauri/target/release/bundle/rpm/*.rpm)
              ;;
          esac

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found for ${{ matrix.platform }}"
            exit 1
          fi

          for file in "${files[@]}"; do
            case "${{ matrix.platform }}" in
              windows)
                if [[ "$file" == *.exe ]]; then
                  target_name="ImageGenerator-$version-windows-$arch-setup.exe"
                else
                  target_name="ImageGenerator-$version-windows-$arch.msi"
                fi
                ;;
              macos)
                target_name="ImageGenerator-$version-macos-$arch.dmg"
                ;;
              linux)
                case "$file" in
                  *.AppImage)
                    target_name="ImageGenerator-$version-linux-$arch.AppImage"
                    ;;
                  *.deb)
                    target_name="ImageGenerator-$version-linux-$arch.deb"
                    ;;
                  *.rpm)
                    target_name="ImageGenerator-$version-linux-$arch.rpm"
                    ;;
                esac
                ;;
            esac

            cp "$file" "$release_dir/$target_name"
          done

          cd "$release_dir"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > "checksums-${{ matrix.platform }}.txt"
          else
            shasum -a 256 * > "checksums-${{ matrix.platform }}.txt"
          fi

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-files/${{ matrix.platform }}/*
          if-no-files-found: error

  release:
    name: Create Release Draft
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --merged "$GITHUB_SHA" --sort=-version:refname | grep -Fxv "$current_tag" | head -n 1 || true)"

          {
            echo "## 本次更新"
            echo
            if [ -n "$previous_tag" ]; then
              git log "$previous_tag..$GITHUB_SHA" --pretty=format:'- %s'
            else
              git log "$GITHUB_SHA" --pretty=format:'- %s'
            fi
            echo
          } > release-notes.md

      - name: Create release draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: release-notes.md
          files: release-assets/*
