name: Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            build-command: pnpm run desktop:build:windows
            artifact-name: windows-packages
            artifact-path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - platform: macos
            os: macos-latest
            build-command: pnpm run desktop:build:macos
            artifact-name: macos-packages
            artifact-path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
          - platform: linux
            os: ubuntu-22.04
            build-command: pnpm run desktop:build:linux
            artifact-name: linux-packages
            artifact-path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libxdo-dev rpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: ${{ matrix.build-command }}

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "release-files/${{ matrix.platform }}"
          shopt -s nullglob

          case "${{ matrix.platform }}" in
            windows)
              files=(src-tauri/target/release/bundle/nsis/*.exe src-tauri/target/release/bundle/msi/*.msi)
              ;;
            macos)
              files=(src-tauri/target/release/bundle/dmg/*.dmg)
              ;;
            linux)
              files=(src-tauri/target/release/bundle/appimage/*.AppImage src-tauri/target/release/bundle/deb/*.deb src-tauri/target/release/bundle/rpm/*.rpm)
              ;;
          esac

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release files found for ${{ matrix.platform }}"
            exit 1
          fi

          for file in "${files[@]}"; do
            cp "$file" "release-files/${{ matrix.platform }}/"
          done

          cd "release-files/${{ matrix.platform }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum * > "checksums-${{ matrix.platform }}.txt"
          else
            shasum -a 256 * > "checksums-${{ matrix.platform }}.txt"
          fi

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

      - name: Upload release files
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: release-files/${{ matrix.platform }}/*
          if-no-files-found: error

  release:
    name: Create Release Draft
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create release draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: release-assets/*
